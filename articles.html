<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Published News</title>

<link rel="stylesheet" href="style.css">

<style>

/* SEARCH */
#search{
width:100%;
padding:10px;
margin-bottom:15px;
background:#065f46;
color:white;
border:none;
border-radius:8px;
}

/* CATEGORY */
.categories{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:15px;
}

.cat-btn{
padding:6px 12px;
background:#064e3b;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

.cat-btn:hover{
background:#22c55e;
color:black;
}

/* GRID */
.article-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
background:#065f46;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.meta{
font-size:12px;
color:#bbf7d0;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-box{
width:90%;
max-width:800px;
padding:20px;
border-radius:10px;
color:white;
max-height:90vh;
overflow-y:auto;
}

.close{
position:absolute;
top:15px;
right:25px;
font-size:25px;
cursor:pointer;
}

.modal-box img{
width:100%;
margin:10px 0;
border-radius:10px;
}

.links a{
display:inline-block;
margin-right:10px;
color:#bbf7d0;
text-decoration:underline;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h1>Published News / Article</h1>

<input type="text" id="search" placeholder="Search articles...">

<div id="categories" class="categories"></div>

<div id="articles" class="article-grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div id="modalBox" class="modal-box">

<span class="close" onclick="closeModal()">✖</span>

<p id="m-cat"></p>
<h2 id="m-title"></h2>
<p id="m-writer"></p>
<p id="m-date"></p>

<img id="m-img">

<p id="m-content"></p>

<div class="links">
<a id="m-source" target="_blank">Source</a>
<a id="m-archive" target="_blank">Archive</a>
</div>

</div>
</div>

<div id="footer"></div>

<script>

let allData=[];
let currentCategory="all";

/* FETCH */
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQIboxF5X3guD1aJoSDYTunwVQukZLITCnFTQgEg5ED-QxdEAyL3lJbI_ukw6F8gXNPPwO5Ghz5-eYN/pub?output=csv")
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1);
let categories=new Set();

rows.forEach(row=>{

let c=row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

/* IMAGE FIX */
let img=c[2];
if(img.includes("open?id=")){
img=img.replace("open?id=","uc?export=view&id=");
}

let obj={
category:c[0],
paper:c[1],
img:img,
title:c[3],
content:c[4],
tag:c[5],
date:c[6],
source:c[7],
writer:c[8],
archive:c[9]
};

allData.push(obj);
categories.add(obj.category);
});

/* CATEGORY BUTTON */
let catDiv=document.getElementById("categories");

let allBtn=document.createElement("div");
allBtn.innerText="All";
allBtn.className="cat-btn";
allBtn.onclick=()=>{currentCategory="all";render();}
catDiv.appendChild(allBtn);

categories.forEach(cat=>{
let btn=document.createElement("div");
btn.innerText=cat;
btn.className="cat-btn";
btn.onclick=()=>{currentCategory=cat;render();}
catDiv.appendChild(btn);
});

render();

});

/* RENDER */
function render(){
let container=document.getElementById("articles");
container.innerHTML="";

let list=allData.filter(a=>{
return currentCategory==="all" || a.category===currentCategory;
});

list.forEach(a=>{
let div=document.createElement("div");
div.className="card";

div.onclick=()=>openModal(a);

div.innerHTML=`
<img src="${a.img}">
<div class="card-body">
<h3>${a.title}</h3>
<div class="meta">${a.paper} | ${a.date}</div>
</div>
`;

container.appendChild(div);
});
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();
let list=allData.filter(a=>a.title.toLowerCase().includes(v));
renderSearch(list);
});

function renderSearch(list){
let container=document.getElementById("articles");
container.innerHTML="";

list.forEach(a=>{
let div=document.createElement("div");
div.className="card";
div.onclick=()=>openModal(a);

div.innerHTML=`
<img src="${a.img}">
<div class="card-body">
<h3>${a.title}</h3>
<div class="meta">${a.paper} | ${a.date}</div>
</div>
`;

container.appendChild(div);
});
}

/* MODAL */
function openModal(a){

let box=document.getElementById("modalBox");

/* CATEGORY COLOR */
let color="#f97316";
if(a.category.toLowerCase()=="campus") color="#0ea5e9";
if(a.category.toLowerCase()=="environment") color="#065f46";
if(a.category.toLowerCase()=="country") color="#7c3aed";
if(a.category.toLowerCase()=="khulna") color="#92400e";

box.style.background=color;

m-cat.innerText=`${a.category} (${a.paper})`;
m-title.innerText=a.title;
m-writer.innerText="By: "+a.writer;
m-date.innerText=a.date;
m-img.src=a.img;
m-content.innerText=a.content;

m-source.href=a.source;
m-archive.href=a.archive;

modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

</script>

<!-- HEADER FOOTER -->
<script>
fetch("./header.html")
.then(r=>r.text())
.then(d=>document.getElementById("header").innerHTML=d);

fetch("./footer.html")
.then(r=>r.text())
.then(d=>document.getElementById("footer").innerHTML=d);
</script>

</body>
</html>
