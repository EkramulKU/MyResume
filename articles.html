<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Newspaper Articles</title>

<link rel="stylesheet" href="style.css">

<style>

/* SEARCH */
#search{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:20px;
background:#065f46;
color:white;
}

/* FILTER */
.filter-btn{
padding:6px 12px;
margin:5px;
border:none;
border-radius:20px;
cursor:pointer;
background:#064e3b;
color:white;
}

.filter-btn.active{
background:#22c55e;
color:black;
}

/* CARD */
.article-card{
background:#065f46;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.article-card:hover{
transform:translateY(-5px);
}

.thumb{
width:100%;
height:150px;
object-fit:cover;
}

.article-content{
padding:10px;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modal-box{
width:90%;
max-width:700px;
background:#065f46;
border-radius:12px;
padding:20px;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

/* CATEGORY COLORS */
.modal.ku .modal-box{background:#0ea5e9;}
.modal.environment .modal-box{background:#065f46;}
.modal.country .modal-box{background:#7c3aed;}
.modal.features .modal-box{background:#047857;}
.modal.khulna .modal-box{background:#b45309;}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h1>Newspaper Articles</h1>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search articles...">

<!-- FILTER -->
<div>
<strong>Newspaper:</strong>
<button class="filter-btn" onclick="setFilter('all','paper')">All</button>
<button class="filter-btn" onclick="setFilter('janakantha','paper')">Janakantha</button>
<button class="filter-btn" onclick="setFilter('sharebiz','paper')">ShareBiz</button>
</div>

<div>
<strong>Category:</strong>
<button class="filter-btn" onclick="setFilter('all','topic')">All</button>
<button class="filter-btn" onclick="setFilter('features','topic')">Features</button>
<button class="filter-btn" onclick="setFilter('country','topic')">Country</button>
<button class="filter-btn" onclick="setFilter('khulna','topic')">Khulna</button>
<button class="filter-btn" onclick="setFilter('ku','topic')">KU</button>
</div>

<!-- ARTICLES -->
<div id="articles" class="quick-links">

<div class="article-card"
onclick="openModal(this)"
data-paper="janakantha"
data-topic="features country"
data-title="Climate Change and Coastal Forest"
data-image="images/article1.jpg"
data-content="Full article content here..."
data-category="features">

<img src="images/article1.jpg" class="thumb">

<div class="article-content">
<h3>Climate Change and Coastal Forest</h3>
<p>Janakantha | 2025</p>
</div>

</div>

<div class="article-card"
onclick="openModal(this)"
data-paper="sharebiz"
data-topic="khulna"
data-title="Sundarbans Economy"
data-image="images/article2.jpg"
data-content="Full details..."
data-category="khulna">

<img src="images/article2.jpg" class="thumb">

<div class="article-content">
<h3>Sundarbans Economy</h3>
<p>ShareBiz | 2024</p>
</div>

</div>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">✖</span>
<h2 id="modal-title"></h2>
<img id="modal-img" style="width:100%;border-radius:10px;">
<p id="modal-content"></p>
</div>
</div>

<div id="footer"></div>

<script>

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
let value = this.value.toLowerCase();
let cards = document.querySelectorAll(".article-card");

cards.forEach(card=>{
let text = card.innerText.toLowerCase();
card.style.display = text.includes(value) ? "block" : "none";
});
});

/* FILTER */
let currentPaper="all";
let currentTopic="all";

function setFilter(value,type){
if(type==="paper") currentPaper=value;
if(type==="topic") currentTopic=value;
applyFilter();
}

function applyFilter(){
let cards=document.querySelectorAll(".article-card");

cards.forEach(card=>{
let paper=card.dataset.paper;
let topics=card.dataset.topic.split(" ");

let show=true;

if(currentPaper!=="all" && paper!==currentPaper) show=false;
if(currentTopic!=="all" && !topics.includes(currentTopic)) show=false;

card.style.display=show?"block":"none";
});
}

/* MODAL */
function openModal(el){
let modal=document.getElementById("modal");

modal.className="modal";
modal.classList.add(el.dataset.category);

document.getElementById("modal-title").innerText=el.dataset.title;
document.getElementById("modal-img").src=el.dataset.image;
document.getElementById("modal-content").innerText=el.dataset.content;

modal.style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* CLICK OUTSIDE */
window.onclick=function(e){
let modal=document.getElementById("modal");
if(e.target===modal) modal.style.display="none";
}

</script>

<script>
fetch("header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
