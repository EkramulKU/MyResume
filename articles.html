<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Published News</title>

<link rel="stylesheet" href="style.css">

<style>
#search{
width:100%;padding:10px;margin-bottom:15px;
background:#065f46;color:white;border:none;border-radius:8px;
}

.categories{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;}
.cat-btn{padding:5px 10px;background:#064e3b;border-radius:15px;cursor:pointer;font-size:12px;}

.article-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:#065f46;border-radius:10px;overflow:hidden;cursor:pointer;
}

.card img{
width:100%;height:150px;object-fit:cover;
}

.card-body{padding:10px;}
.meta{font-size:12px;color:#bbf7d0;}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
display:none;background:rgba(0,0,0,0.9);
justify-content:center;align-items:center;
}

.modal-box{
width:90%;max-width:700px;padding:20px;border-radius:10px;color:white;
}

.close{
position:absolute;top:10px;right:20px;font-size:25px;cursor:pointer;
}
</style>
</head>

<body>

<div id="header"></div>

<div class="container">

<h1>Published News / Article</h1>

<input type="text" id="search" placeholder="Search...">

<div id="categories" class="categories"></div>
<div id="articles" class="article-grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div id="modalBox" class="modal-box">
<span onclick="closeModal()" class="close">✖</span>

<p id="m-cat"></p>
<h2 id="m-title"></h2>
<p id="m-date"></p>

<img id="m-img" style="width:100%">
<p id="m-content"></p>

</div>
</div>

<div id="footer"></div>

<script>

let allData=[];
let currentCategory="all";

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQUxbJF3z6jVTMniOo9HOUKqIFSIfPufZgxppyWNQWMhewBmNuWX55kC-TlMeayX9dq1txsa-iLCER4/pub?output=csv")
.then(r=>r.text())
.then(d=>{

let rows=d.split("\n").slice(1);
let categories=new Set();

rows.forEach(row=>{

let c=row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

if(c[1].trim()!=="Article") return;

let obj={
category:c[2],
paper:c[3],
img:c[4],
title:c[5],
content:c[6],
date:c[0]
};

allData.push(obj);
categories.add(obj.category);
});

/* CATEGORY */
let catDiv=document.getElementById("categories");

let allBtn=document.createElement("div");
allBtn.innerText="All";
allBtn.className="cat-btn";
allBtn.onclick=()=>{currentCategory="all";render();}
catDiv.appendChild(allBtn);

categories.forEach(cat=>{
let btn=document.createElement("div");
btn.innerText=cat;
btn.className="cat-btn";
btn.onclick=()=>{currentCategory=cat;render();}
catDiv.appendChild(btn);
});

render();

});

/* RENDER */
function render(){
let container=document.getElementById("articles");
container.innerHTML="";

let list=allData.filter(a=>currentCategory==="all" || a.category===currentCategory);

list.forEach(a=>{
let div=document.createElement("div");
div.className="card";

div.onclick=()=>openModal(a);

div.innerHTML=`
<img src="${a.img}">
<div class="card-body">
<h3>${a.title}</h3>
<div class="meta">${a.paper} | ${a.date}</div>
</div>
`;

container.appendChild(div);
});
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();
let list=allData.filter(a=>a.title.toLowerCase().includes(v));
renderSearch(list);
});

function renderSearch(list){
let container=document.getElementById("articles");
container.innerHTML="";

list.forEach(a=>{
let div=document.createElement("div");
div.className="card";
div.onclick=()=>openModal(a);

div.innerHTML=`
<img src="${a.img}">
<div class="card-body">
<h3>${a.title}</h3>
<div class="meta">${a.paper} | ${a.date}</div>
</div>
`;

container.appendChild(div);
});
}

/* MODAL */
function openModal(a){

let box=document.getElementById("modalBox");

let color="#f97316";

if(a.category.toLowerCase()==="campus") color="#0ea5e9";
if(a.category.toLowerCase()==="environment") color="#065f46";
if(a.category.toLowerCase()==="country") color="#7c3aed";

box.style.background=color;

m-cat.innerText=`${a.category} (${a.paper})`;
m-title.innerText=a.title;
m-date.innerText=a.date;
m-img.src=a.img;
m-content.innerText=a.content;

modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

</script>

</body>
</html>
