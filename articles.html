<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles</title>

<link rel="stylesheet" href="style.css">

<style>
#articles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#065f46;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:10px;
}
</style>
</head>

<body>

<div id="header"></div>

<div class="container">
<h1>Published News / Article</h1>

<div id="articles"></div>

</div>

<div id="footer"></div>

<script>

/* GOOGLE SHEET JSON */
const sheetID = "1l1PH3AmTPBBXB2mWuAyHVV6XnvKOeIUHrgkvSejAr5o";
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

fetch(url)
.then(res=>res.text())
.then(data=>{

let json = JSON.parse(data.substr(47).slice(0,-2));
let rows = json.table.rows;

let container = document.getElementById("articles");

rows.forEach(r=>{

let c = r.c;

if(!c[0]) return;

let category = c[0]?.v || "";
let paper = c[1]?.v || "";
let img = c[2]?.v || "";
let title = c[3]?.v || "";
let content = c[4]?.v || "";
let date = c[6]?.v || "";

/* FIX DRIVE IMAGE */
if(img.includes("open?id=")){
img = img.replace("open?id=","uc?export=view&id=");
}

let div = document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${img}">
<div class="card-body">
<h3>${title}</h3>
<p>${paper} | ${date}</p>
</div>
`;

container.appendChild(div);

});

});
</script>

<script>
fetch("./header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("./footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
