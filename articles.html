<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles</title>

<link rel="stylesheet" href="style.css">

<style>

#search{
width:100%;
padding:10px;
margin-bottom:10px;
background:#065f46;
border:none;
color:white;
border-radius:8px;
}

.filter-bar{
margin-bottom:10px;
}

.filter-btn{
padding:5px 10px;
margin:3px;
border-radius:15px;
background:#064e3b;
color:white;
cursor:pointer;
font-size:12px;
}

/* CARD */
.article-card{
background:#065f46;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.article-card:hover{transform:scale(1.03);}

.thumb{
width:100%;
height:140px;
object-fit:cover;
}

/* FEATURED */
.featured{
border:2px solid gold;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-box{
width:90%;
max-width:700px;
padding:20px;
border-radius:10px;
color:white;
}

.close{
position:absolute;
top:10px;
right:20px;
font-size:25px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h1>Articles</h1>

<input type="text" id="search" placeholder="Search...">

<div class="filter-bar">
<button class="filter-btn" onclick="setFilter('all','all')">All</button>
<button class="filter-btn" onclick="setFilter('janakantha','paper')">Janakantha</button>
<button class="filter-btn" onclick="setFilter('samakal','paper')">Samakal</button>
<button class="filter-btn" onclick="setFilter('kalbela','paper')">Kalbela</button>

<button class="filter-btn" onclick="setFilter('features','topic')">Features</button>
<button class="filter-btn" onclick="setFilter('country','topic')">Country</button>
<button class="filter-btn" onclick="setFilter('campus','topic')">Campus</button>
<button class="filter-btn" onclick="setFilter('environment','topic')">Environment</button>
</div>

<div id="articles" class="quick-links"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">✖</span>
<h2 id="m-title"></h2>
<img id="m-img" style="width:100%">
<p id="m-content"></p>
</div>
</div>

<div id="footer"></div>

<script>

let allArticles=[];

/* FETCH DATA */
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT2RFKlzhDHYkEzHFXRC14VtWLSAujhNXIYoHp70I-v4378yAp9CFpIcDQNCNpy4dc5pDkL1q5KnyRd/pub?output=csv")
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1);

rows.forEach(row=>{
let c=row.split(",");

let obj={
img:c[0],
title:c[1],
content:c[2],
paper:c[3],
category:c[4],
tags:c[5].split(" "),
date:c[6],
featured:c[7]
};

allArticles.push(obj);
});

render(allArticles);
});

/* RENDER */
function render(list){

let container=document.getElementById("articles");
container.innerHTML="";

list.sort((a,b)=>b.date-a.date);

list.forEach(a=>{

let div=document.createElement("div");
div.className="article-card "+(a.featured==="yes"?"featured":"");

div.onclick=()=>openModal(a);

div.innerHTML=`
<img src="${a.img}" class="thumb">
<div style="padding:8px">
<h3>${a.title}</h3>
<p>${a.paper} | ${a.date}</p>
</div>
`;

container.appendChild(div);

});
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();
let filtered=allArticles.filter(a=>a.title.toLowerCase().includes(v));
render(filtered);
});

/* FILTER */
let cp="all",ct="all";

function setFilter(v,t){
if(t==="paper") cp=v;
else if(t==="topic") ct=v;
else{cp="all";ct="all";}

applyFilter();
}

function applyFilter(){
let filtered=allArticles.filter(a=>{
let ok=true;
if(cp!=="all" && a.paper!==cp) ok=false;
if(ct!=="all" && !a.tags.includes(ct)) ok=false;
return ok;
});
render(filtered);
}

/* MODAL */
function openModal(a){

let modal=document.getElementById("modal");

modal.className="modal "+a.category;

document.getElementById("m-title").innerText=a.title;
document.getElementById("m-img").src=a.img;
document.getElementById("m-content").innerText=a.content;

modal.style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

<script>
fetch("header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
