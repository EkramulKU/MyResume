<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles</title>

<link rel="stylesheet" href="style.css">

<style>

#search{
width:100%;
padding:12px;
margin-bottom:20px;
background:#065f46;
color:white;
border:none;
border-radius:25px;
}

.categories{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.cat-btn{
padding:6px 14px;
background:#064e3b;
border-radius:20px;
cursor:pointer;
}

.cat-btn:hover{
background:#22c55e;
color:black;
}

.articles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
border-radius:12px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:10px;
color:white;
}

/* CATEGORY COLORS */
.Campus{background:#38bdf8;}
.Environment{background:#064e3b;}
.Features{background:#7c3aed;}
.Khulna{background:#78350f;}
.Country{background:#9333ea;}
.Tour{background:#f97316;}
.default{background:#6b21a8;}

.meta{
font-size:12px;
color:#d1fae5;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
overflow:auto;
z-index:9999;
padding:30px;
}

.modal-box{
max-width:800px;
margin:auto;
background:#022c22;
padding:20px;
border-radius:10px;
color:white;
}

.modal img{
width:100%;
margin:15px 0;
}

.close{
position:fixed;
top:20px;
right:30px;
font-size:30px;
color:white;
cursor:pointer;
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px 5px 0 0;
padding:8px 12px;
background:#22c55e;
color:black;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h1 style="text-align:center">Published News / Article</h1>

<input id="search" placeholder="Search...">

<div id="categories" class="categories"></div>

<div id="articles" class="articles"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="close" onclick="closeModal()">✖</span>
<div class="modal-box" id="modalContent"></div>
</div>

<div id="footer"></div>

<script>

const spaceId = "ca2wujfe3emd";
const accessToken = "e44CFNyOf4TaY2Qnze4Vr18ny7EGnPR9XYH-9oemanQ";

/* FIXED CATEGORY */
let defaultCategories=["Campus","Environment","Features","Country","Khulna","Tour"];

fetch(`https://cdn.contentful.com/spaces/${spaceId}/entries?access_token=${accessToken}&content_type=newsArticles&include=1`)
.then(res=>res.json())
.then(data=>{

let items=data.items;
let assets=data.includes?.Asset || [];

let assetMap={};
assets.forEach(a=>{
assetMap[a.sys.id]="https:"+a.fields.file.url;
});

let all=[];
let categories=new Set(defaultCategories);

items.forEach(i=>{
let f=i.fields;

let obj={
title:f.title || "",
writer:f.writer || "",
category:(f.category || "default").trim(),
newspaper:f.newspaper || "",
image: f.photo?.sys ? assetMap[f.photo.sys.id] : "",
content:f.content || "",
source:f.source || "#",
archive:f.archive || "#",
date:f.date || ""
};

if(!obj.image) return;

all.push(obj);
categories.add(obj.category);
});

/* CATEGORY BUTTON */
let catDiv=document.getElementById("categories");

let allBtn=document.createElement("div");
allBtn.innerText="All";
allBtn.className="cat-btn";
allBtn.onclick=()=>render(all);
catDiv.appendChild(allBtn);

[...categories].sort().forEach(c=>{
let btn=document.createElement("div");
btn.innerText=c;
btn.className="cat-btn";

btn.onclick=()=>{
let filtered=all.filter(i=>i.category===c);
render(filtered);
};

catDiv.appendChild(btn);
});

render(all);

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();

let filtered=all.filter(i=>
i.title.toLowerCase().includes(v)
);

render(filtered);
});

});

/* RENDER */
function render(list){

let container=document.getElementById("articles");
container.innerHTML="";

list.forEach(i=>{

let div=document.createElement("div");

let catClass = i.category.replace(/\s/g,'');

div.className="card";

div.innerHTML=`
<img src="${i.image}">
<div class="card-content ${catClass}">
<h3>${i.title}</h3>
<div class="meta">${i.newspaper} | ${i.date}</div>
</div>
`;

div.onclick=()=>openModal(i);

container.appendChild(div);

});

}

/* MODAL */
function openModal(i){

modal.style.display="block";

modalContent.innerHTML=`
<h2>${i.title}</h2>
<p><b>${i.category} (${i.newspaper})</b></p>
<p>✍ ${i.writer}</p>
<p>${i.date}</p>

<img src="${i.image}">

<p>${i.content}</p>

<a href="${i.source}" target="_blank" class="btn">Source</a>
<a href="${i.archive}" target="_blank" class="btn">Archive</a>
`;

}

function closeModal(){
modal.style.display="none";
}

/* ESC CLOSE */
document.addEventListener("keydown",e=>{
if(e.key==="Escape") closeModal();
});

</script>

<script>
fetch("./header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("./footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
