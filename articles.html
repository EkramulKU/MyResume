<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles</title>

<link rel="stylesheet" href="style.css">

<style>
.article-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#065f46;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{padding:10px;}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#065f46;
padding:20px;
max-width:700px;
width:90%;
border-radius:10px;
}
</style>

</head>

<body>

<div id="header"></div>

<div class="container">
<h1>Published News / Article</h1>
<div id="articles" class="article-grid"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">

<span onclick="closeModal()" style="cursor:pointer">✖</span>

<h2 id="m-title"></h2>
<p id="m-meta"></p>
<img id="m-img" style="width:100%">
<p id="m-content"></p>

<p>
<a id="m-source" target="_blank">Source</a> |
<a id="m-archive" target="_blank">Archive</a>
</p>

</div>
</div>

<div id="footer"></div>

<script>

fetch("data.json")
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("articles");

data.articles.forEach(a=>{

let div=document.createElement("div");
div.className="card";

div.onclick=()=>openModal(a);

div.innerHTML=`
<img src="${a.image}">
<div class="card-body">
<h3>${a.title}</h3>
<p>${a.newspaper} | ${a.date}</p>
</div>
`;

container.appendChild(div);

});

});

function openModal(a){
m-title.innerText=a.title;
m-meta.innerText=`${a.category} | ${a.writer}`;
m-img.src=a.image;
m-content.innerText=a.content;

m-source.href=a.source;
m-archive.href=a.archive;

modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

</script>

<script>
fetch("./header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("./footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
