/* BODY */
body{

background:linear-gradient(to bottom,#022c22,#064e3b);

}

/* HEADER */
header{
padding:15px 10%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(6,78,59,0.95);
position:sticky;
top:0;

}

header h2{color:#4ade80;}

/* NAV */
nav{display:flex;}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
transition:0.3s;
}

nav a:hover{color:#4ade80;}

/* MOBILE */
.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

/* HERO */
.hero{
text-align:center;
padding:40px 10%;
}

/* PROFILE */
.profile-img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid #22c55e;
margin-bottom:15px;
}

/* TEXT */
.hero h1{font-size:2.3rem;}
.hero p{color:#bbf7d0;}

/* SOCIAL ICONS */
.socials{
margin-top:15px;
}

.socials a{
display:inline-block;
margin:6px;
font-size:20px;
width:40px;
height:40px;
line-height:40px;
text-align:center;
background:#065f46;
border-radius:50%;
color:white;
transition:0.3s;
}

.socials a:hover{
background:#22c55e;
color:black;
transform:scale(1.1);
}

/* QUICK LINKS */
.quick-links{
padding:30px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:#065f46;
padding:15px;
border-radius:12px;
text-align:center;
text-decoration:none;
color:white;
transition:0.3s;
}

.card:hover{
background:#047857;
transform:translateY(-5px);
}

/* LOGOS */
.logos{
padding:20px 10%;
text-align:center;
}

.logo-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
gap:15px;
}

.logo-grid a{
display:flex;
align-items:center;
justify-content:center;
background:#065f46;
border-radius:10px;
padding:10px;
height:90px;
}

.logo-grid img{
max-width:60px;
max-height:60px;
object-fit:contain;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:#bbf7d0;
}

/* MOBILE */
@media(max-width:768px){

nav{
display:none;
flex-direction:column;
background:#022c22;
position:absolute;
top:65px;
right:10%;
padding:15px;
border-radius:10px;
}

nav.active{display:flex;}

.menu-btn{display:block;}

.hero h1{font-size:1.7rem;}
