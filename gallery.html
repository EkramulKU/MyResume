<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link rel="stylesheet" href="style.css">

<style>

#search{
width:100%;
padding:12px;
margin-bottom:20px;
background:#065f46;
color:white;
border:none;
border-radius:25px;
}

.categories{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.cat-btn{
padding:6px 14px;
background:#064e3b;
border-radius:20px;
cursor:pointer;
}

.cat-btn:hover{
background:#22c55e;
color:black;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#065f46;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:contain;
background:#022c22;
}

.caption{
padding:10px;
text-align:center;
color:#bbf7d0;
font-size:14px;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:85%;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h1 style="text-align:center">Photo Gallery</h1>

<input id="search" placeholder="Search...">

<div id="categories" class="categories"></div>

<div id="gallery" class="gallery"></div>

</div>

<div id="modal" class="modal">
<span class="close" onclick="closeImg()">✖</span>
<img id="modalImg">
</div>

<div id="footer"></div>

<script>

const spaceId = "ca2wujfe3emd";
const accessToken = "e44CFNyOf4TaY2Qnze4Vr18ny7EGnPR9XYH-9oemanQ";

fetch(`https://cdn.contentful.com/spaces/${spaceId}/entries?access_token=${accessToken}&content_type=gallery&include=1`)
.then(res=>res.json())
.then(data=>{

let items = data.items;
let assets = data.includes.Asset;

let assetMap = {};
assets.forEach(a=>{
assetMap[a.sys.id] = "https:" + a.fields.file.url;
});

let all=[];
let categories=new Set();

items.forEach(i=>{
let f=i.fields;

if(!f.category) return; // 🔥 empty category skip

let obj={
title:f.title,
category:f.category.trim(),
image: assetMap[f.image.sys.id]
};

all.push(obj);
categories.add(obj.category);
});

/* CATEGORY BUTTON */
let catDiv=document.getElementById("categories");

let allBtn=document.createElement("div");
allBtn.innerText="All";
allBtn.className="cat-btn";
allBtn.onclick=()=>render(all);
catDiv.appendChild(allBtn);

/* SORT CATEGORY */
let sorted=[...categories].sort();

sorted.forEach(c=>{
let btn=document.createElement("div");
btn.innerText=c;
btn.className="cat-btn";

btn.onclick=()=>{
let filtered=all.filter(i=>i.category===c);
render(filtered);
};

catDiv.appendChild(btn);
});

render(all);

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();

let filtered=all.filter(i=>
i.title.toLowerCase().includes(v)
);

render(filtered);
});

});

function render(list){

let container=document.getElementById("gallery");
container.innerHTML="";

list.forEach(i=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${i.image}" onclick="openImg('${i.image}')">
<div class="caption">${i.title}</div>
`;

container.appendChild(div);

});

}

function openImg(src){
modal.style.display="flex";
modalImg.src=src;
}

function closeImg(){
modal.style.display="none";
}

</script>

<script>
fetch("./header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("./footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
