<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link rel="stylesheet" href="style.css">

<style>

/* ===== SEARCH ===== */
#search{
width:100%;
padding:12px;
margin-bottom:20px;
background:#065f46;
color:white;
border:none;
border-radius:25px;
outline:none;
}

/* ===== CATEGORY ===== */
.categories{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.cat-btn{
padding:6px 14px;
background:#064e3b;
border-radius:20px;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

.cat-btn:hover{
background:#22c55e;
color:black;
}

/* ===== GALLERY ===== */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#065f46;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* ===== IMAGE FIX ===== */
.card img{
width:100%;
height:220px;
object-fit:contain; /* FULL IMAGE SHOW */
background:#022c22;
}

/* ===== CAPTION ===== */
.caption{
padding:12px;
color:#bbf7d0;
font-size:14px;
}

.caption b{
color:#4ade80;
}

/* ===== MODAL ===== */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.modal img{
max-width:90%;
max-height:85%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:32px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<h1 style="text-align:center;margin-bottom:20px;">Photo Gallery</h1>

<input id="search" placeholder="Search gallery...">

<div id="categories" class="categories"></div>

<div id="gallery" class="gallery"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="close" onclick="closeImg()">✖</span>
<img id="modalImg">
</div>

<div id="footer"></div>

<script>

/* 🔥 CONFIG */
const spaceId = "ca2wujfe3emd";
const accessToken = "e44CFNyOf4TaY2Qnze4Vr18ny7EGnPR9XYH-9oemanQ";

/* FETCH DATA */
fetch(`https://cdn.contentful.com/spaces/${spaceId}/entries?access_token=${accessToken}&content_type=gallery&include=1`)
.then(res=>res.json())
.then(data=>{

let items = data.items;
let assets = data.includes.Asset;

/* MAP IMAGE */
let assetMap = {};
assets.forEach(a=>{
assetMap[a.sys.id] = "https:" + a.fields.file.url;
});

let all=[];
let categories=new Set();

/* PROCESS DATA */
items.forEach(i=>{
let f=i.fields;

let obj={
title:f.title || "No title",
category:f.category || "Other",
image: assetMap[f.image?.sys?.id] || "",
caption:f.caption || "",
date: f.date ? new Date(f.date).toLocaleDateString() : ""
};

all.push(obj);
categories.add(obj.category);
});

/* CATEGORY BUTTON */
let catDiv=document.getElementById("categories");

/* ALL BUTTON */
let allBtn=document.createElement("div");
allBtn.innerText="All";
allBtn.className="cat-btn";
allBtn.onclick=()=>render(all);
catDiv.appendChild(allBtn);

/* DYNAMIC CATEGORY */
categories.forEach(c=>{
let btn=document.createElement("div");
btn.innerText=c;
btn.className="cat-btn";

btn.onclick=()=>{
let filtered=all.filter(i=>i.category===c);
render(filtered);
};

catDiv.appendChild(btn);
});

/* INITIAL LOAD */
render(all);

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();

let filtered=all.filter(i=>
i.title.toLowerCase().includes(v) ||
i.caption.toLowerCase().includes(v)
);

render(filtered);
});

});

/* RENDER FUNCTION */
function render(list){

let container=document.getElementById("gallery");
container.innerHTML="";

if(list.length===0){
container.innerHTML="<p>No images found</p>";
return;
}

list.forEach(i=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${i.image}" onclick="openImg('${i.image}')">
<div class="caption">
<b>${i.title}</b><br>
${i.caption}<br>
<small>${i.category} | ${i.date}</small>
</div>
`;

container.appendChild(div);

});

}

/* MODAL */
function openImg(src){
modal.style.display="flex";
modalImg.src=src;
}

function closeImg(){
modal.style.display="none";
}

</script>

<!-- HEADER FOOTER LOAD -->
<script>
fetch("./header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("./footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
