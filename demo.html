<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organization</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#021a14;
color:white;
}

/* LAYOUT */
.wrapper{
display:grid;
grid-template-columns:300px 1fr;
height:100vh;
}

/* LEFT SIDEBAR */
.sidebar{
background:#064e3b;
padding:25px;
position:sticky;
top:0;
height:100vh;
overflow:auto;
}

.sidebar img{
width:100px;
height:100px;
object-fit:contain;
background:white;
padding:8px;
border-radius:10px;
margin-bottom:15px;
}

.sidebar h2{
color:#4ade80;
margin-bottom:10px;
}

.sidebar p{
font-size:14px;
color:#bbf7d0;
margin-bottom:15px;
}

/* BUTTONS */
.btn{
display:block;
margin-top:10px;
padding:8px;
text-align:center;
background:#22c55e;
color:black;
border-radius:6px;
text-decoration:none;
}

/* RIGHT CONTENT */
.content{
padding:40px;
overflow-y:auto;
}

/* CARD */
.card{
background:#065f46;
padding:20px;
border-radius:12px;
margin-bottom:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* TITLE */
.title{
color:#22c55e;
margin-bottom:10px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.gallery img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* MOBILE */
@media(max-width:768px){
.wrapper{
grid-template-columns:1fr;
}

.sidebar{
position:relative;
height:auto;
}
}

</style>

</head>

<body>

<div id="header"></div>

<div class="wrapper">

<!-- LEFT SIDE (ABOUT ORG) -->
<div class="sidebar">

<img src="images/logo.png">

<h2>Organization Name</h2>

<p>
Short description about organization. What it does, purpose, impact.
</p>

<a href="#" class="btn">🌐 Website</a>
<a href="#" class="btn">🔗 Facebook</a>
<a href="#" class="btn">🔗 LinkedIn</a>

</div>

<!-- RIGHT SIDE -->
<div class="content">

<!-- ROLE -->
<div class="card">
<h2 class="title">My Role & Contributions</h2>

<p><b>Position:</b> President</p>

<ul>
<li>Organized workshops</li>
<li>Led team</li>
<li>Handled media activities</li>
<li>Increased participation</li>
</ul>

</div>

<!-- GALLERY -->
<div class="card">
<h2 class="title">Gallery</h2>

<div class="gallery">
<img src="images/g1.jpg">
<img src="images/g2.jpg">
<img src="images/g3.jpg">
<img src="images/g4.jpg">
</div>

</div>

</div>

</div>

<div id="footer"></div>

<script>
fetch("./header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("./footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
