<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organization</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#021a14;
color:white;
font-family:'Poppins',sans-serif;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:40px auto;
padding:20px;
}

/* HERO */
.hero{
display:flex;
align-items:center;
gap:20px;
background:#064e3b;
padding:20px;
border-radius:12px;
}

.hero img{
width:80px;
height:80px;
object-fit:contain;
background:white;
padding:5px;
border-radius:10px;
}

.hero h1{
color:#4ade80;
}

/* CARD */
.card{
background:#065f46;
padding:20px;
border-radius:12px;
margin-top:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* SECTION TITLE */
.section-title{
color:#22c55e;
margin-bottom:10px;
}

/* LIST */
ul{
padding-left:20px;
}

li{
margin-bottom:8px;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="container">

<!-- HERO -->
<div class="hero">
<img src="images/logo.png">
<div>
<h1>Organization Name</h1>
<p>Short tagline about organization</p>
</div>
</div>

<!-- YOUR ROLE -->
<div class="card">
<h2 class="section-title">My Role & Contributions</h2>

<p><b>Position:</b> Your Position</p>

<ul>
<li>What you did</li>
<li>Responsibilities</li>
<li>Leadership work</li>
<li>Impact / achievements</li>
</ul>

</div>

<!-- ABOUT -->
<div class="card">
<h2 class="section-title">About Organization</h2>

<p>
Write details about the organization, its mission, activities, and importance.
</p>

</div>

</div>

<div id="footer"></div>

<script>
fetch("./header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("./footer.html").then(r=>r.text()).then(d=>footer.innerHTML=d);
</script>

</body>
</html>
